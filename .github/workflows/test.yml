name: Test

on:
  push:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: vehicle-management

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vehicle-management/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test
