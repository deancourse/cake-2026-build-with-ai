name: Run Tests

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vehicle-management-system/package-lock.json

      - name: Install dependencies
        working-directory: vehicle-management-system
        run: npm ci

      - name: Run tests
        working-directory: vehicle-management-system
        run: npm test
